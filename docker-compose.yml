services:
  backend:
    build: ./HR-Ops_Backend
    container_name: ems-backend
    env_file:
      - ./HR-Ops_Backend/.env
    ports:
      - "5002:5002"
    restart: always

  nginx:
    build: ./HR-Ops_Frontend
    container_name: ems-nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always